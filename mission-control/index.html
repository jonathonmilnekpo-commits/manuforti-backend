<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Mission Control - Aiden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #0f1419 100%);
            min-height: 100vh;
            color: #e2e8f0;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 64px;
            background: rgba(15, 20, 30, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            backdrop-filter: blur(10px);
        }

        .sidebar-header {
            margin-bottom: 20px;
            padding: 8px;
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.2);
        }

        .sidebar-header svg {
            width: 24px;
            height: 24px;
            color: #3b82f6;
        }

        .nav-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            padding: 0 8px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #94a3b8;
            font-size: 10px;
            gap: 4px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .nav-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 12px 8px;
            width: calc(100% - 16px);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            height: 56px;
            background: rgba(15, 20, 30, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #f8fafc;
        }

        .header-search {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 12px;
            color: #64748b;
            font-size: 13px;
            min-width: 200px;
        }

        .content-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .memory-panel {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .date-navigator {
            width: 280px;
            background: rgba(15, 20, 30, 0.6);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            padding: 16px;
        }

        .memory-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .memory-title {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .memory-badge {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .long-term-memory {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(6, 182, 212, 0.15) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .long-term-memory:hover {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.25) 0%, rgba(6, 182, 212, 0.25) 100%);
        }

        .ltm-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .ltm-icon {
            width: 32px;
            height: 32px;
            background: rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ltm-title {
            font-size: 14px;
            font-weight: 600;
            color: #f8fafc;
        }

        .month-group {
            margin-bottom: 8px;
        }

        .month-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
        }

        .month-header:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        .month-header.expanded {
            color: #3b82f6;
        }

        .days-list {
            padding-left: 28px;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }

        .days-list.expanded {
            max-height: 2000px;
        }

        .day-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin: 2px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            color: #94a3b8;
        }

        .day-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        .day-item.active {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        .viewer-panel {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .viewer-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
            text-align: center;
        }

        .memory-content {
            background: rgba(15, 20, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            line-height: 1.7;
            color: #e2e8f0;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <h1 class="header-title">Memory</h1>
                    <div class="header-search">
                        <span>Search memory...</span>
                    </div>
                </div>
            </header>

            <div class="content-area">
                <div class="memory-panel">
                    <div class="date-navigator">
                        <div class="memory-header">
                            <span class="memory-title">Daily Journal</span>
                            <span class="memory-badge" id="entry-count">Loading...</span>
                        </div>

                        <div class="long-term-memory" onclick="showLongTermMemory()">
                            <div class="ltm-header">
                                <div class="ltm-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>

    <script>
        // Load memory data from your actual memory files
        let memoryData = {};
        
        async function loadMemoryFiles() {
            console.log('Fetching memory data from /api/memory...');
            try {
                const response = await fetch('/api/memory?t=' + Date.now(), {
                    headers: { 'Cache-Control': 'no-cache' }
                });
                console.log('Response status:', response.status);
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                memoryData = await response.json();
                const monthKeys = Object.keys(memoryData);
                console.log('Memory data loaded:', monthKeys.length, 'months:', monthKeys);
                
                // If no data, show message
                if (monthKeys.length === 0) {
                    document.getElementById('months-container').innerHTML = 
                        '<p style="color:#64748b;padding:20px;text-align:center;">No memory files found.<br>Create files in memory/YYYY-MM-DD.md</p>';
                    document.getElementById('entry-count').textContent = '0 entries';
                    return;
                }
                
                // Force clear container before rendering
                const container = document.getElementById('months-container');
                container.innerHTML = '';
                
                renderMonths();
            } catch (error) {
                console.error('Error loading memory:', error);
                document.getElementById('months-container').innerHTML = 
                    '<p style="color:#ef4444;padding:20px;text-align:center;">Error: ' + error.message + '<br>Check console (F12) for details.</p>';
            }
        }

        function renderMonths() {
            const container = document.getElementById('months-container');
            container.innerHTML = ''; // Clear existing
            
            const months = Object.keys(memoryData).sort().reverse();
            console.log('Rendering months:', months);
            console.log('First month (index 0):', months[0], 'Days:', memoryData[months[0]]?.length);
            console.log('Second month (index 1):', months[1], 'Days:', memoryData[months[1]]?.length);
            
            // Force March (2026-03) to be first if it exists
            const marchIndex = months.indexOf('2026-03');
            if (marchIndex > 0) {
                months.splice(marchIndex, 1);
                months.unshift('2026-03');
                console.log('Reordered to put March first:', months);
            }
            
            if (months.length === 0) {
                container.innerHTML = '<p style="color:#64748b;padding:20px;text-align:center;">No memory files found.</p>';
                return;
            }
            
            months.forEach((month, index) => {
                const days = memoryData[month];
                const monthName = new Date(month + '-01').toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                
                const monthGroup = document.createElement('div');
                monthGroup.className = 'month-group';
                // Auto-expand the first (most recent) month
                const isExpanded = index === 0 ? 'expanded' : '';
                const arrowTransform = index === 0 ? 'rotate(90deg)' : 'rotate(0deg)';
                const listMaxHeight = index === 0 ? '1000px' : '0';
                
                monthGroup.innerHTML = `
                    <div class="month-header ${isExpanded}" onclick="toggleMonth(this)">
                        <svg class="month-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;transition:transform 0.2s;transform:${arrowTransform}">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                        <span>${monthName} <small style="opacity:0.5;font-weight:normal">(${month})</small></span>
                        <span class="month-count">${days.length}</span>
                    </div>
                    <div class="days-list ${isExpanded}">
                        ${days.map(day => `
                            <div class="day-item" onclick="showDay('${day.date}', '${day.title}', event)">
                                <div class="day-info">
                                    <div class="day-date">${day.day}</div>
                                    <div class="day-meta">${day.words} words</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(monthGroup);
            });

            const totalEntries = Object.values(memoryData).reduce((sum, days) => sum + days.length, 0);
            document.getElementById('entry-count').textContent = `${totalEntries} entries`;
        }

        function toggleMonth(header) {
            header.classList.toggle('expanded');
            const arrow = header.querySelector('.month-arrow');
            arrow.style.transform = header.classList.contains('expanded') ? 'rotate(90deg)' : 'rotate(0deg)';
            const daysList = header.nextElementSibling;
            daysList.classList.toggle('expanded');
        }

        async function showDay(date, title, event) {
            document.querySelectorAll('.day-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const viewer = document.getElementById('viewer-panel');
            viewer.innerHTML = `
                <div style="max-width:800px;margin:0 auto;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1);">
                        <h2 style="font-size:24px;font-weight:600;color:#f8fafc;">${title}</h2>
                        <span style="font-size:14px;color:#64748b;">${date}</span>
                    </div>
                    <div class="memory-content">
                        <p>Loading...</p>
                    </div>
                </div>
            `;
            
            try {
                const response = await fetch(`/api/memory/${date}`);
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                
                // Convert markdown to HTML (basic)
                const htmlContent = markdownToHtml(data.content);
                
                viewer.innerHTML = `
                    <div style="max-width:800px;margin:0 auto;">
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1);">
                            <h2 style="font-size:24px;font-weight:600;color:#f8fafc;">${title}</h2>
                            <span style="font-size:14px;color:#64748b;">${date}</span>
                        </div>
                        <div class="memory-content">${htmlContent}</div>
                    </div>
                `;
            } catch (error) {
                viewer.innerHTML = `
                    <div style="max-width:800px;margin:0 auto;">
                        <div class="memory-content">
                            <p style="color:#ef4444;">Error loading memory: ${error.message}</p>
                        </div>
                    </div>
                `;
            }
        }
        
        function markdownToHtml(markdown) {
            return markdown
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/`([^`]+)`/gim, '<code>$1</code>')
                .replace(/^- (.*$)/gim, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/\n/gim, '<br>');
        }

        async function showLongTermMemory() {
            const viewer = document.getElementById('viewer-panel');
            viewer.innerHTML = `
                <div style="max-width:800px;margin:0 auto;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1);">
                        <h2 style="font-size:24px;font-weight:600;color:#f8fafc;">Long-Term Memory</h2>
                        <span style="font-size:14px;color:#64748b;">Curated Knowledge</span>
                    </div>
                    <div class="memory-content">
                        <p>Loading...</p>
                    </div>
                </div>
            `;
            
            try {
                const response = await fetch('/api/long-term-memory');
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                const htmlContent = markdownToHtml(data.content);
                
                viewer.innerHTML = `
                    <div style="max-width:800px;margin:0 auto;">
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1);">
                            <h2 style="font-size:24px;font-weight:600;color:#f8fafc;">Long-Term Memory</h2>
                            <span style="font-size:14px;color:#64748b;">Curated Knowledge</span>
                        </div>
                        <div class="memory-content">${htmlContent}</div>
                    </div>
                `;
            } catch (error) {
                viewer.innerHTML = `
                    <div style="max-width:800px;margin:0 auto;">
                        <div class="memory-content">
                            <p style="color:#ef4444;">Error loading long-term memory: ${error.message}</p>
                            <p>Make sure MEMORY.md exists in your workspace.</p>
                        </div>
                    </div>
                `;
            }
        }

        // Initialize
        console.log('Memory panel initializing...');
        loadMemoryFiles().catch(err => {
            console.error('Failed to load memory files:', err);
            document.getElementById('months-container').innerHTML = 
                '<p style="color:#ef4444;padding:20px;text-align:center;">Failed to load memory.<br>Check browser console (F12) for details.</p>';
        });
    </script>
