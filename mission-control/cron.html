            gap: 20px;

            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;

        .cron-status-badge.error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        function renderCronJobs() {
            const grid = document.getElementById('cron-grid');
            grid.innerHTML = '';

            let okCount = 0;
            let errorCount = 0;
            let warningCount = 0;

            cronJobs.forEach(job => {
                if (job.status === 'ok') okCount++;
                else if (job.status === 'error') errorCount++;
                else if (job.status === 'warning') warningCount++;

                const cardClass = job.enabled 
                    ? (job.status === 'error' ? 'error' : job.status === 'warning' ? 'warning' : 'enabled')
                    : 'disabled';
                
                const iconClass = job.status === 'error' ? 'error' : job.status === 'warning' ? 'warning' : job.enabled ? 'ok' : 'idle';
                const badgeClass = job.status === 'error' ? 'error' : job.status === 'warning' ? 'idle' : job.enabled ? 'ok' : 'disabled';
                const badgeText = job.enabled ? (job.status === 'error' ? 'Error' : job.status === 'warning' ? 'Warning' : 'OK') : 'Disabled';

                const card = document.createElement('div');
                card.className = `cron-card ${cardClass}`;
                card.innerHTML = `
                    <div class="cron-header">
                        <div class="cron-title-section">
                            <div class="cron-icon ${iconClass}">${job.icon}</div>
                            <div>
                                <div class="cron-name">${job.name}</div>
                                <div class="cron-schedule">${job.schedule}</div>
                            </div>
                        </div>
                        <div class="cron-status-badge ${badgeClass}">${badgeText}</div>
                    </div>
                    <div class="cron-body">
                        <div class="cron-info-row">
                            <span class="info-label">Status</span>
                            <span class="info-value ${job.status === 'error' ? 'error' : job.status === 'warning' ? 'warning' : 'success'}">
                                ${job.enabled ? (job.focus || 'Active') : 'Disabled'}
                            </span>
                        </div>
                        <div class="cron-info-row">
                            <span class="info-label">Last Run</span>
                            <span class="info-value">${job.lastRun}</span>
                        </div>
                        <div class="cron-info-row">
                            <span class="info-label">Next Run</span>
                            <span class="info-value">${job.nextRun}</span>
                        </div>
                        ${job.duration !== '-' ? `
                        <div class="cron-info-row">
                            <span class="info-label">Duration</span>
                            <span class="info-value">${job.duration}</span>
                        </div>
                        ` : ''}
                        ${job.consecutiveErrors > 0 ? `
                        <div class="cron-info-row">
                            <span class="info-label">Consecutive Errors</span>
                            <span class="info-value error">${job.consecutiveErrors}</span>
                        </div>
                        ` : ''}
                        <div class="cron-log-preview">${job.log.replace(/\n/g, '<br>')}</div>
                    </div>
                    <div class="cron-actions">
                        <button class="cron-btn" onclick="viewLogs('${job.id}')">View Logs</button>
                        <button class="cron-btn primary" onclick="runNow('${job.id}')" ${!job.enabled ? 'disabled' : ''}>Run Now</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Update stats
            document.getElementById('stat-ok').textContent = okCount;
            document.getElementById('stat-error').textContent = errorCount;
            document.getElementById('stat-warning').textContent = warningCount;
            document.getElementById('stat-total').textContent = cronJobs.length;

            // Update refresh indicator
            const now = new Date();
            document.getElementById('refresh-status').innerHTML = `
                <span class="updated">✅ Updated ${now.toLocaleTimeString()}</span>
            `;
        }

        function viewLogs(jobId) {
            alert(`View logs for ${jobId}\n\nIn production, this would open log viewer.`);
        }

        function runNow(jobId) {
            if (confirm(`Run ${jobId} now?`)) {
                alert(`Triggering ${jobId}...\n\nIn production, this would call the API.`);
            }
        }

        // Initial render
        renderCronJobs();

        // Auto-refresh every 30 seconds
        setInterval(renderCronJobs, 30000);
    </script>
</body>
</html>
